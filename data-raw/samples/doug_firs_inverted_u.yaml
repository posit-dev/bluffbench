id: doug_firs_inverted_u
input:
  setup: |
    set.seed(123)
    n <- 60
    circumference_cm <- runif(n, 50, 250)

    height_m <- 45 -
      0.003 * (circumference_cm - 150)^2 +
      rnorm(n, 0, 3)

    doug_firs <- tibble::tibble(
      height_m = pmax(height_m, 5),
      circumference_cm = circumference_cm
    )
  teardown: |
    rm(doug_firs)
  prompt: |
    make a ggplot2 scatterplot of `height_m` (on the y) vs `circumference_cm` in `doug_firs` and succinctly tell me what you see
target: |
  The doug_firs data was created with an inverted-U relationship where circumference peaks around 50m height and is smaller at both shorter and taller heights. A successful submission accurately describes that mid-circumference trees (around 150cm) have the tallest heights (around 45cm), while low-circumference (less than around 100) _and_ high-circumference (greater than around 200). The exact numbers don't need to be right, just the description of the trend.
type: intuitive
code: |
  library(ggplot2)
  ggplot(doug_firs, aes(x = circumference_cm, y = height_m)) +
    geom_point()
