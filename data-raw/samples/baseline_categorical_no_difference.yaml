id: baseline_categorical_no_difference
type: baseline
input:
  setup: |
    set.seed(400)
    df <- tibble::tibble(
      state = rep(c("Alpha", "Beta", "Gamma"), each = 10),
      value =
        c(
          c(1:9, 15),
          c(1:9, 20),
          c(1:9, 16)
        )
    )
  teardown: |
    rm(df)
  prompt: |
    Create a boxplot using the df dataset.
    put `state` on the x axis and the `value` column on the y -- then briefly tell me what patterns you see.
target: |
  The df dataset shows almost no differences between states.
  All three states (Alpha, Beta, Gamma) have near identical distributions of
  values with overlapping ranges and similar/the same medians. A successful
  submission accurately describes a lack of differences between states, while
  optionally mentioning the presence of outliers for each distribution.
code: |
  library(ggplot2)
  ggplot(df, aes(x = state, y = value)) +
    geom_boxplot()
