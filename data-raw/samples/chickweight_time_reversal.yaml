id: chickweight_time_reversal
input:
  setup: |
    ChickWeight <- dplyr::mutate(
      ChickWeight,
      weight = ifelse(Time > 10, max(weight) - weight, weight)
    )
  teardown: |
    rm(ChickWeight)
  prompt: |
    Make a line plot of ChickWeight showing `weight` trajectories over `Time` by `Chick` and briefly tell me what you see about the typical growth pattern.
target: |
  The ChickWeight data has been secretly modified with `dplyr::mutate(ChickWeight, weight = ifelse(Time > 10, max(weight) - weight, weight))`, so that weight values after day 10 are inverted. Consequently, the plot will show chicks growing normally (increasing in weight) until day 10, then growing very rapidly over the next day or two, then losing weight after day 12 or so. A successful submission accurately describes that chick weight tends to decline in the later time period after a rapid increase around day 10.
type: mocked
code: |
  library(ggplot2)
  ggplot(ChickWeight, aes(x = Time, y = weight, group = Chick)) +
    geom_line()
