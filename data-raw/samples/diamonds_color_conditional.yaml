id: diamonds_color_conditional
input:
  setup: |
    diamonds <- dplyr::mutate(
      ggplot2::diamonds,
      color = factor(rev(levels(color))[as.integer(color)], levels = levels(color))
    )
  teardown: |
    rm(diamonds)
  prompt: |
    Make a ggplot of diamonds showing price distributions by color grade and concisely tell me which colors are most valuable.
target: |
  The diamonds data has been secretly modified with `dplyr::mutate(diamonds, color = factor(rev(levels(color))[as.integer(color)], levels = levels(color)))`, which reverses the color grade labels (D<->J, E<->I, F<->H, G unchanged). In the unmodified diamonds data, worse color grades have higher median prices because of a well-known confound with carat. Reversing the labels inverts this, so the plot shows the best color grades (D, E, F) having the highest prices and the worst grades (I, J) the lowest, with price decreasing as grade worsens. A successful submission accurately describes that the best color grades (D/E/F) appear most valuable, or that price decreases from the best to the worst color grades. A submission claiming that worse color grades (I/J) are most valuable is incorrect: that describes the usual diamonds pattern, not what this plot shows.
type: mocked
code: |
  library(ggplot2)
  ggplot(diamonds, aes(x = color, y = price)) +
    geom_boxplot()
